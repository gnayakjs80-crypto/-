<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8942a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="지리는 흐른다">
<link rel="apple-touch-icon" href="icon-192.png">
<title>지리는 흐른다 🗺️</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --paper: #f5f0e8;
    --ink: #1a0a00;
    --red: #cc2200;
    --gold: #c8942a;
    --blue: #1a3a6e;
    --green: #1a4a2a;
    --fade: rgba(200,148,42,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--paper);
    font-family: 'Nanum Gothic', sans-serif;
    overflow-x: hidden;
  }

  /* INTRO SCREEN */
  #intro {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  #intro .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(3rem, 10vw, 8rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(200,148,42,0.5), 4px 4px 0 var(--red);
    letter-spacing: 0.1em;
    animation: pulse 2s ease-in-out infinite;
  }

  #intro .title-sub {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(1rem, 3vw, 2rem);
    color: rgba(245,240,232,0.7);
    margin-top: 1rem;
    letter-spacing: 0.5em;
  }

  #intro .click-hint {
    margin-top: 3rem;
    font-size: 1rem;
    color: rgba(200,148,42,0.6);
    animation: blink 1.5s step-end infinite;
    letter-spacing: 0.3em;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* MAIN APP */
  #app {
    display: none;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--gold);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.4rem;
    z-index: 100;
  }

  header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.8rem;
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--red);
  }

  .beat-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 0.4rem 0.8rem;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .beat-btn:hover { background: var(--gold); color: var(--ink); transform: scale(1.05); }
  .beat-btn.playing { animation: beatPulse 0.5s ease infinite; background: var(--gold); color: var(--ink); }

  @keyframes beatPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* LYRICS SCROLL */
  #lyrics-container {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 50;
    display: none;
  }

  #lyrics-text {
    position: absolute;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold), 2px 2px 0 var(--red);
    white-space: nowrap;
    text-align: center;
  }

  /* REGION SECTIONS */
  .region-section {
    padding: 3rem 2rem;
    border-bottom: 1px solid rgba(200,148,42,0.2);
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .region-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 50%, var(--fade) 0%, transparent 70%);
    pointer-events: none;
  }

  .region-section:hover {
    background: rgba(200,148,42,0.05);
  }

  .region-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .region-flag {
    font-size: 2.5rem;
  }

  .region-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    line-height: 1;
  }

  .region-tag {
    font-size: 0.75rem;
    background: var(--gold);
    color: var(--ink);
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    font-weight: 800;
    letter-spacing: 0.1em;
  }

  /* PLACE CARDS GRID */
  .places-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .place-card {
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(200,148,42,0.3);
    border-radius: 6px;
    padding: 0.5rem 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .place-card:hover {
    background: rgba(200,148,42,0.15);
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(200,148,42,0.2);
  }

  .place-card.active {
    background: rgba(200,148,42,0.18);
    border-color: var(--gold);
    border-width: 2px;
  }

  .visited-mark {
    display: none;
    font-size: 0.65rem;
    color: #c8942a;
    font-family: 'Black Han Sans', sans-serif;
    margin-top: 0.2rem;
    letter-spacing: 0.05em;
  }

  .place-card.active .visited-mark {
    display: block;
  }

  .place-card.active .place-name {
    color: #c8942a;
  }

  .place-name {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem;
    font-weight: 700;
  }

  .place-desc {
    font-size: 0.7rem;
    color: rgba(200,148,42,0.8);
    margin-top: 0.1rem;
  }

  .place-card.active .place-desc {
    color: rgba(200,148,42,0.7);
  }

  /* INFO PANEL */
  #info-panel {
    position: fixed;
    right: -380px;
    top: 80px;
    bottom: 0;
    width: 360px;
    background: rgba(10,10,15,0.98);
    border-left: 2px solid var(--gold);
    padding: 1.5rem;
    z-index: 200;
    transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow-y: auto;
  }

  #info-panel.open { right: 0; }

  #info-panel h2 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--red);
    margin-bottom: 0.3rem;
  }

  #info-panel .info-tag {
    font-size: 0.75rem;
    color: rgba(200,148,42,0.6);
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
  }

  #info-panel .info-body {
    font-family: 'Nanum Myeongjo', serif;
    line-height: 1.8;
    color: rgba(245,240,232,0.85);
    font-size: 0.95rem;
  }

  #info-panel .close-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid rgba(200,148,42,0.3);
    color: var(--gold);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .info-keyword {
    display: inline-block;
    margin: 0.3rem 0.2rem;
    background: rgba(200,148,42,0.15);
    border: 1px solid rgba(200,148,42,0.3);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-size: 0.8rem;
    color: var(--gold);
  }

  /* FLOWING LYRIC BAR */
  #lyric-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(200,148,42,0.95);
    color: var(--ink);
    padding: 0.6rem 0;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    overflow: hidden;
    white-space: nowrap;
    z-index: 300;
    display: none;
  }

  #lyric-track {
    display: inline-block;
    white-space: nowrap;
    will-change: transform;
  }

  @keyframes scrollLyricContinuous {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* PROGRESS */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--gold);
    width: 0%;
    z-index: 999;
    transition: width 0.3s;
    box-shadow: 0 0 10px var(--gold);
  }

  /* REFRAIN */
  .refrain {
    text-align: center;
    padding: 2rem;
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: var(--red);
    text-shadow: 0 0 30px rgba(204,34,0,0.5);
    border-top: 2px solid rgba(204,34,0,0.3);
    border-bottom: 2px solid rgba(204,34,0,0.3);
    background: rgba(204,34,0,0.05);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(204,34,0,0.4); }
    50% { text-shadow: 0 0 50px rgba(204,34,0,0.8), 0 0 100px rgba(200,148,42,0.3); }
  }

  .refrain span { color: var(--gold); }

  /* SEARCH */
  #search-bar {
    position: sticky;
    top: 70px;
    background: rgba(10,10,15,0.9);
    padding: 0.8rem 2rem;
    z-index: 90;
    border-bottom: 1px solid rgba(200,148,42,0.2);
  }

  #search-input {
    width: 100%;
    max-width: 400px;
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(200,148,42,0.4);
    color: var(--paper);
    padding: 0.5rem 1rem;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.95rem;
    border-radius: 4px;
    outline: none;
  }

  #search-input:focus { border-color: var(--gold); }
  #search-input::placeholder { color: rgba(245,240,232,0.3); }

  .highlight { background: rgba(200,148,42,0.3); border-radius: 2px; }

  /* STATS BAR */
  #stats {
    background: rgba(26,10,0,0.5);
    padding: 0.8rem 2rem;
    display: flex;
    gap: 2rem;
    font-size: 0.85rem;
    color: rgba(200,148,42,0.7);
    border-bottom: 1px solid rgba(200,148,42,0.1);
  }

  #stats strong { color: var(--gold); }

  /* SCROLL ANIMATION */
  .region-section {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .region-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* NORTH/SOUTH indicator */
  .nk-badge {
    background: var(--red);
    color: white;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    font-weight: 800;
    letter-spacing: 0.05em;
    vertical-align: middle;
  }
  .sk-badge {
    background: var(--blue);
    color: white;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    font-weight: 800;
    letter-spacing: 0.05em;
    vertical-align: middle;
  }

  @media (max-width: 600px) {
    #info-panel { width: 100%; right: -100%; top: 70px; }
    .region-section { padding: 2rem 1rem; }
  }

  @keyframes fadeInPop {
    from { opacity:0; transform:translate(-50%,-50%) scale(0.85); }
    to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }

  /* ======= MAP GAME ======= */
  #map-modal {
    display: none;
    position: fixed; inset: 0; z-index: 600;
    background: rgba(10,10,15,0.97);
    flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 1rem;
    overflow-y: auto;
  }
  #map-modal.open { display: flex; }
  #map-game-header {
    width: 100%; max-width: 700px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.7rem;
    flex-wrap: wrap; gap: 0.4rem;
  }
  #map-game-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.4rem; color: #c8942a;
  }
  #map-game-stats {
    display: flex; gap: 1rem; align-items: center;
    font-family: 'Nanum Gothic', sans-serif; font-size: 0.9rem;
  }
  #mg-coins {
    color: #f5c842; font-size: 1.1rem;
    font-family: 'Black Han Sans', sans-serif;
  }
  #mg-score { color: #c8942a; }
  #mg-question-box {
    width: 100%; max-width: 700px;
    background: rgba(200,148,42,0.12);
    border: 1px solid rgba(200,148,42,0.4);
    border-radius: 8px;
    padding: 0.8rem 1.2rem;
    margin-bottom: 0.7rem;
    text-align: center;
  }
  #mg-q-label {
    font-size: 0.75rem; color: rgba(245,240,232,0.5);
    font-family: 'Nanum Gothic', sans-serif;
    margin-bottom: 0.2rem;
  }
  #mg-q-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.8rem; color: #f5f0e8;
    letter-spacing: 0.1em;
  }
  #mg-q-hint {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.85rem; color: rgba(200,148,42,0.8);
    margin-top: 0.3rem;
  }
  #mg-feedback {
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.9rem; margin-top: 0.3rem;
    min-height: 1.2rem;
  }
  #map-canvas-wrap {
    position: relative;
    width: 100%; max-width: 700px;
    cursor: crosshair;
    transition: opacity 0.2s;
    border: 2px solid rgba(200,148,42,0.3);
    border-radius: 6px;
    overflow: hidden;
    user-select: none;
  }
  #map-canvas-wrap img {
    width: 100%; display: block;
    pointer-events: none;
  }
  #map-dot-layer {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .map-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 3px solid #fff;
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
    transition: transform 0.2s;
  }
  .map-dot.correct { background: #2acc2a; animation: dotPop 0.4s ease; }
  .map-dot.wrong   { background: #cc2200; }
  .map-dot.target  { background: #c8942a; border-color: #fff; }
  @keyframes hintPulse {
    0%  { opacity:0.8; transform:translate(-50%,-50%) scale(0.5); }
    50% { opacity:1;   transform:translate(-50%,-50%) scale(1.2); }
    100%{ opacity:0;   transform:translate(-50%,-50%) scale(1); }
  }
  @keyframes dotPop {
    0%  { transform: translate(-50%,-50%) scale(0.5); opacity:0.5; }
    60% { transform: translate(-50%,-50%) scale(1.5); }
    100%{ transform: translate(-50%,-50%) scale(1); opacity:1; }
  }
  #mg-close-btn {
    position: absolute; top: 0.5rem; right: 0.8rem;
    background: none; border: none;
    color: rgba(245,240,232,0.5); font-size: 1.5rem;
    cursor: pointer;
  }
  #mg-close-btn:hover { color: #c8942a; }
  #mg-progress-bar {
    width: 100%; max-width: 700px;
    height: 4px; background: rgba(200,148,42,0.15);
    border-radius: 2px; margin-bottom: 0.5rem;
  }
  #mg-progress-fill {
    height: 100%; background: #c8942a;
    border-radius: 2px; transition: width 0.3s;
  }
  #mg-result {
    display: none;
    width: 100%; max-width: 700px;
    text-align: center;
    padding: 2rem;
    font-family: 'Nanum Gothic', sans-serif;
  }
  #mg-start-screen {
    width: 100%; max-width: 700px;
    text-align: center;
    padding: 1.5rem 1rem;
  }
  .mg-mode-btn {
    display: block; width: 100%;
    padding: 0.8rem; margin-bottom: 0.6rem;
    background: rgba(200,148,42,0.12);
    border: 1px solid rgba(200,148,42,0.4);
    color: #f5f0e8;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem; cursor: pointer;
    border-radius: 6px; letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  .mg-mode-btn:hover { background: rgba(200,148,42,0.3); }
  #coin-display {
    position: fixed; top: 0.5rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem; color: #f5c842;
    z-index: 700;
    pointer-events: none;
    display: none;
  }
  .coin-float {
    position: fixed;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.2rem; color: #f5c842;
    pointer-events: none; z-index: 800;
    animation: floatUp 1.2s ease forwards;
  }
  @keyframes floatUp {
    0%  { opacity:1; transform: translateY(0) scale(1); }
    100%{ opacity:0; transform: translateY(-60px) scale(1.4); }
  }

</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div style="text-align:center">
    <div class="title-main">지리는 흐른다</div>
    <div class="title-sub">이기상 지리 스타일 — 한반도 완전 정복</div>
    <div style="margin-top:2rem; font-family:'Nanum Myeongjo',serif; color:rgba(200,148,42,0.5); font-size:0.9rem; max-width:400px; line-height:1.8; text-align:center">
      압록강부터 제주도까지<br>북쪽 끝 온성에서 남쪽 끝 서귀포까지<br>한반도 모든 지명을 노래하다
    </div>
    <div class="click-hint">▶ 클릭하여 시작</div>
  </div>
</div>

<div id="progress-bar"></div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>지리는 흐른다 🌊</h1>
    <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
      <span id="visited-count" style="font-size:0.85rem;color:rgba(200,148,42,0.7)">0개 탐방</span>
      <button class="beat-btn" id="play-btn" onclick="toggleBeat()">🎵 비트 시작</button>
      <button class="beat-btn" onclick="openQuiz()" style="background:#1a3a6e">📝 테스트</button>
      <button class="beat-btn" onclick="openMapGame()" style="background:#2a4a1a">🗺️ 지도게임</button>
      <button class="beat-btn" onclick="openWrongNote()" style="background:#3a1a3a" id="wrong-note-btn">📒 오답노트 <span id="wrong-note-count" style="background:#cc2200;border-radius:10px;padding:0 5px;font-size:0.75rem;display:none">0</span></button>
    </div>
  </header>

  <div id="search-bar">
    <input id="search-input" type="text" placeholder="🔍 지명 검색... (예: 평양, 서울, 제주)" oninput="searchPlaces(this.value)">
  </div>

  <div id="stats">
    <span>총 지명 <strong id="total-count">0</strong>개</span>
    <span>탐방 완료 <strong id="visited-stat">0</strong>개</span>
    <span>진행률 <strong id="progress-pct">0%</strong></span>
  </div>

  <div id="main-content"></div>
</div>

<!-- INFO PANEL -->
<div id="info-panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<!-- LYRIC BAR -->
<div id="lyric-bar"><div id="lyric-track"></div></div>

<script>
// ============================================
// DATA
// ============================================
const regions = [
  {
    id: 'pyeonganbuk',
    name: '평안북도',
    flag: '🏔️',
    color: '#1a3a6e',
    tag: '관서 북부',
    places: [
      { name: '용천', desc: '용암포 항구', info: '평안북도 서쪽 끝 압록강 하구의 고을. 용암포 항구가 있으며 중국과의 조공 무역 요충지. 2004년 용천역 폭발사고로 알려졌다.', tags: ['조공무역','압록강','항구'] },

function renderApp() {
  const container = document.getElementById('main-content');

  regions.forEach(region => {
    totalCount += region.places.length;
    const section = document.createElement('div');
    section.className = 'region-section';

    section.style.borderLeft = `4px solid ${region.color}`;

      <div class="region-header">

          <div class="place-card" id="card-${region.id}-${place.name}" onclick="selectPlace('${region.id}::${place.name}')">

  container.appendChild(refrain);

  document.getElementById('total-count').textContent = totalCount;
  updateStats();
}

function setupScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.region-section').forEach(section => {
    observer.observe(section);
  });

  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    scrollRatio = Math.min(100, (scrollTop / docHeight) * 100);
    document.getElementById('progress-bar').style.width = scrollRatio + '%';
  });
}

function selectPlace(key) {
  const name = key.includes('::') ? key.split('::')[1] : key;
  const info = placeInfo[key] || placeInfo[Object.keys(placeInfo).find(k => k.endsWith('::'+name))];
  if (!info) return;
  const regionId = key.includes('::') ? key.split('::')[0] : '';
  const cardId = 'card-' + regionId + '-' + name;
  const card = document.getElementById(cardId);

  // Toggle visited
  if (visited.has(key)) {
    visited.delete(key);
    if (card) card.classList.remove('active');
  } else {
    visited.add(key);
    if (card) card.classList.add('active');
  }

  updateStats();
  showPanel(info);
}

function showPanel(info) {
  const panel = document.getElementById('info-panel');
  const content = document.getElementById('panel-content');

  content.innerHTML = `
    <h2>${info.name}</h2>

function updateStats() {
  const total = Object.keys(placeInfo).length;
  const visitedCount = visited.size;

  document.getElementById('visited-count').textContent = visitedCount + '개 탐방';

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.85;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// --- 킥드럼 ---
function kick(t) {
  const ctx = getAudioCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = 'sine';
  o.frequency.setValueAtTime(200, t);
  o.frequency.exponentialRampToValueAtTime(30, t + 0.5);
  g.gain.setValueAtTime(1.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o.start(t); o.stop(t + 0.5);
}

// --- 스네어 ---
function snare(t) {
  const ctx = getAudioCtx();
  // noise
  const len = ctx.sampleRate * 0.2;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 3000; bp.Q.value = 0.5;
  const g = ctx.createGain();
  g.gain.setValueAtTime(1.0, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.2);
  // body tone
  const o = ctx.createOscillator();
  const og = ctx.createGain();
  o.type = 'triangle'; o.frequency.value = 180;
  og.gain.setValueAtTime(0.4, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o.connect(og); og.connect(masterGain);
  o.start(t); o.stop(t + 0.08);
}

// --- 하이햇 ---
function hihat(t, vol) {
  const ctx = getAudioCtx();
  const len = ctx.sampleRate * 0.05;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 10000;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.05);
}

// --- 베이스라인 ---
function bass(t, note) {
  const ctx = getAudioCtx();
  const freqs = { C: 65.4, D: 73.4, E: 82.4, F: 87.3, G: 98.0, A: 110, B: 123.5 };
  const freq = freqs[note] || 65.4;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'sawtooth'; o.frequency.value = freq;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 300;
  g.gain.setValueAtTime(0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.35);
}

// BPM 90, 한 박자 = 60/90 = 0.667s, 8분음표 = 0.333s
const BPM = 90;
const beat = 60 / BPM;        // 한 박자 (4분음표)
const half = beat / 2;         // 8분음표
const quarter = beat / 4;      // 16분음표

// 1마디 = 4박 = 4*beat 초
// 패턴: 킥(1,2박반,3박), 스네어(2,4박), 하이햇(8분음표)
// 베이스: C D E G 순환

function playBar(t) {
  const barLen = beat * 4;
  const bassNotes = ['C','C','G','G','A','A','F','F'];
  const nb = bassNotes[Math.floor(((audioCtx.currentTime - t) / barLen + 100)) % 8];

  // 킥
  kick(t);
  kick(t + beat * 2.5);

  // 스네어
  snare(t + beat * 1);
  snare(t + beat * 3);

  // 하이햇 8분음표
  for (let i = 0; i < 8; i++) {
    hihat(t + i * half, i % 2 === 0 ? 0.35 : 0.2);
  }

  // 베이스 (1박, 3박)
  bass(t, 'C');
  bass(t + beat * 2, 'G');
}


function scheduleLoop() {
  const ctx = getAudioCtx();
  while (nextBarTime < ctx.currentTime + 0.5) {
    playBar(nextBarTime);
    nextBarTime += beat * 4;
    barCount++;
  }
}

function startBeat() {
  const ctx = getAudioCtx();
  nextBarTime = ctx.currentTime + 0.05;
  barCount = 0;
  scheduleLoop();
  barScheduler = setInterval(scheduleLoop, 200);
}

function stopBeat() {
  if (barScheduler) { clearInterval(barScheduler); barScheduler = null; }
}

function toggleBeat() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('play-btn');
  const lyricBar = document.getElementById('lyric-bar');
  if (isPlaying) {
    btn.textContent = '⏸ 비트 정지';
    btn.classList.add('playing');
    lyricBar.style.display = 'block';

    initLyricTrack();
  } else {
    btn.textContent = '🎵 비트 시작';
    btn.classList.remove('playing');
    lyricBar.style.display = 'none';
    stopBeat();
  }
}

function initLyricTrack() {

// QUIZ SYSTEM

// ============================================
// 효과음
// ============================================
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

// ── 오딥노트 (THX Deep Note 스타일) ──────────────────
function playDeepNote() {
  try {
    if (_ac.state === 'suspended') _ac.resume();
    const VOICES = 30;
    const DURATION = 8;
    const ac = getAC(); const t = ac.currentTime;

    // 마스터 게인 (페이드인/아웃)
    const master = ac.createGain();
    const compressor = ac.createDynamicsCompressor();
    compressor.threshold.value = -10;
    compressor.ratio.value = 4;
    master.connect(compressor);
    compressor.connect(ac.destination);

    // 페이드인 → 유지 → 페이드아웃
    master.gain.setValueAtTime(0, t);
    master.gain.linearRampToValueAtTime(0.7, t + 1.5);
    master.gain.setValueAtTime(0.7, t + DURATION - 1.5);
    master.gain.linearRampToValueAtTime(0, t + DURATION);

    // 목표 화음: D major (D2~D5 여러 옥타브)
    const targetFreqs = [
      36.71, 73.42, 146.83, 293.66, 587.33,   // D
      43.65, 87.31, 174.61, 349.23,             // F#
      55.00, 110.00, 220.00, 440.00,            // A
      73.42, 146.83, 293.66,                    // D (중복 강화)
      110.00, 220.00,                           // A (중복)
      36.71, 73.42,                             // 저음 D
      587.33, 880.00, 1174.66,                  // 고음
      293.66, 349.23, 440.00, 523.25, 659.25, 783.99, 987.77
    ].slice(0, VOICES);

    for (let i = 0; i < VOICES; i++) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      const panner = ac.createStereoPanner();

      osc.connect(gain);
      gain.connect(panner);
      panner.connect(master);

      // 파형: 저음은 sawtooth, 고음은 sine 혼합
      osc.type = targetFreqs[i] < 150 ? 'sawtooth' : (targetFreqs[i] < 400 ? 'square' : 'sine');

      // 시작 주파수: 무작위 (50~2000Hz)
      const startFreq = 50 + Math.random() * 1950;
      osc.frequency.setValueAtTime(startFreq, t);

      // 처음 3초: 카오스 → 목표 주파수로 수렴
      osc.frequency.exponentialRampToValueAtTime(targetFreqs[i], t + 3 + Math.random() * 2);
      osc.frequency.setValueAtTime(targetFreqs[i], t + 5);

      // 미세 비브라토
      const lfo = ac.createOscillator();
      const lfoGain = ac.createGain();
      lfo.frequency.value = 0.5 + Math.random() * 2;
      lfoGain.gain.value = targetFreqs[i] * 0.003;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(t); lfo.stop(t + DURATION);

      // 볼륨: 중간 주파수가 조금 더 강하게
      const vol = 0.06 + (targetFreqs[i] > 100 && targetFreqs[i] < 600 ? 0.04 : 0);
      gain.gain.setValueAtTime(vol, t);

      // 스테레오 패닝 (보이스마다 다름)
      panner.pan.value = (i / VOICES) * 2 - 1;

      osc.start(t);
      osc.stop(t + DURATION);
    }

    // 저음 베이스 드론 강화
    for (let bass = 0; bass < 3; bass++) {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(master);
      o.type = 'sine';
      o.frequency.setValueAtTime(36.71 * (bass + 1), t + 3);
      g.gain.setValueAtTime(0, t + 2);
      g.gain.linearRampToValueAtTime(0.15, t + 4);
      g.gain.setValueAtTime(0.15, t + DURATION - 1);
      g.gain.linearRampToValueAtTime(0, t + DURATION);
      o.start(t + 2); o.stop(t + DURATION);
    }
  } catch(e) { console.warn('DeepNote error:', e); }
}

function playCorrect() {
  try {
    const ac = getAC(); const t = ac.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t+i*0.1);
      g.gain.linearRampToValueAtTime(0.18, t+i*0.1+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t+i*0.1+0.25);
      o.start(t+i*0.1); o.stop(t+i*0.1+0.3);
    });
  } catch(e) {}
}

function playPerfect() {

const NORTH_REGIONS = ['pyeonganbuk','pyeongannam','hamgyeongnam','hamgyeongbuk','hwanghae'];
// 남한 행정구역이지만 실제 북한 지역인 곳 (regionId::name 또는 name)
const NORTH_PLACES = new Set(['개성','회양','평강','통천','gangwon::이천']);
function isNorthPlace(regionId, name) {
  return NORTH_REGIONS.includes(regionId) || NORTH_PLACES.has(regionId+'::'+name) || NORTH_PLACES.has(name);
}
const SOUTH_REGIONS = ['gyeonggi','gangwon','chungnam','chungbuk','jeonbuk','jeonnam','gyeongbuk','gyeongnam','jeju'];

let quizType = 'region';
let quizScope = 'all';
let quizCount = 10;
let quizQuestions = [];
let quizCurrent = 0;
let quizScore = 0;
let quizWrong = [];

function openQuiz() {
  document.getElementById('quiz-modal').style.display = 'block';
  showQuizSetup();
}
function closeQuiz() {
  document.getElementById('quiz-modal').style.display = 'none';
}
function showQuizSetup() {
  document.getElementById('quiz-setup').style.display = 'block';
  document.getElementById('quiz-play').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
}

function selectQuizType(btn, type) {
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  quizType = type;
}
function selectQuizScope(btn, scope) {
  document.querySelectorAll('[data-scope]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  quizScope = scope;
}
function selectQuizCount(btn, count) {
  document.querySelectorAll('[data-count]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  quizCount = count;
}

function getFilteredPlaces() {
  let pool = [];
  regions.forEach(r => {
    r.places.forEach(p => {
      const north = isNorthPlace(r.id, p.name);
      if (quizScope === 'all' || (quizScope === 'north' && north) || (quizScope === 'south' && !north)) {
        pool.push({ ...p, region: r.name, regionId: r.id });
      }
    });
  });
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = getFilteredPlaces();
  if (pool.length < 4) { alert('범위 내 지명이 너무 적습니다.'); return; }

  if (quizType === 'pair') {
    startPairQuiz(pool);
    return;
  }

  quizQuestions = shuffle(pool).slice(0, Math.min(quizCount, pool.length));
  quizCurrent = 0;
  quizScore = 0;
  quizWrong = [];

  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-play').style.display = 'block';
  document.getElementById('q-total').textContent = quizQuestions.length;

  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[quizCurrent];
  const total = quizQuestions.length;
  document.getElementById('q-current').textContent = quizCurrent + 1;
  document.getElementById('q-progress').style.width = (quizCurrent / total * 100) + '%';
  document.getElementById('q-feedback').style.display = 'none';
  const nextBtn = document.getElementById('q-next-btn');
  nextBtn.style.display = 'none';
  nextBtn.onclick = nextQuestion; // 짝맞추기 후 onclick 초기화

  const pool = getFilteredPlaces();
  const allRegions = [...new Set(pool.map(p => p.region))];
  const container = document.getElementById('q-options');
  container.style.gridTemplateColumns = '1fr 1fr';

  if (quizType === 'region') {
    document.getElementById('q-question').textContent = q.name + ' 은/는 어느 도?';
    document.getElementById('q-hint').textContent = '💡 ' + q.desc;
    const wrongRegions = shuffle(allRegions.filter(r => r !== q.region)).slice(0, 3);
    const options = shuffle([q.region, ...wrongRegions]);
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'q-opt-card';
      btn.textContent = opt;
      btn.addEventListener('click', function() { answerQuestion(this, opt, q.region); });
      container.appendChild(btn);
    });

  } else if (quizType === 'desc') {
    document.getElementById('q-question').textContent = '이 설명의 지명은?';
    document.getElementById('q-hint').textContent = q.info.substring(0, 80) + '...';
    const wrongs = shuffle(pool.filter(p => p.name !== q.name)).slice(0, 3);
    const options = shuffle([q, ...wrongs]);
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'q-opt-card';
      btn.textContent = opt.name;
      btn.addEventListener('click', function() { answerQuestion(this, opt.name, q.name); });
      container.appendChild(btn);
    });
  }
}

function answerQuestion(btn, chosen, correct) {
  const allBtns = document.querySelectorAll('.q-opt-card');
  allBtns.forEach(b => b.disabled = true);
  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    allBtns.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
    playWrong();
    quizWrong.push({ q: quizQuestions[quizCurrent], chosen });
    addToWrongNote('quiz', { ...quizQuestions[quizCurrent], chosen });
  } else {
    quizScore++;
    playCorrect();
    document.getElementById('q-score').textContent = quizScore;
  }
  const fb = document.getElementById('q-feedback');
  const q = quizQuestions[quizCurrent];
  fb.style.display = 'block';
  fb.style.background = isCorrect ? 'rgba(42,138,42,0.15)' : 'rgba(204,34,0,0.1)';
  fb.style.border = isCorrect ? '1px solid rgba(42,138,42,0.4)' : '1px solid rgba(204,34,0,0.3)';
  fb.style.color = isCorrect ? '#7aff7a' : '#ff9a9a';
  fb.innerHTML = isCorrect
    ? '✅ 정답! <span style="color:#c8942a">' + q.name + '</span> — ' + q.info.substring(0,60) + '...'
    : '❌ 오답. 정답: <span style="color:#c8942a">' + correct + '</span> — ' + q.info.substring(0,60) + '...';
  const nextBtn = document.getElementById('q-next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = quizCurrent + 1 >= quizQuestions.length ? '결과 보기 🏆' : '다음 문제 →';
}

function nextQuestion() {
  quizCurrent++;
  if (quizCurrent >= quizQuestions.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quiz-play').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';
  const total = quizQuestions.length;
  const pct = Math.round(quizScore / total * 100);
  let emoji, title;
  if (pct === 100) { emoji = '🏆'; title = '만점! 지리 마스터!'; }
  else if (pct >= 80) { emoji = '🥇'; title = '훌륭해요! 지리왕!'; }
  else if (pct >= 60) { emoji = '🥈'; title = '잘했어요! 더 공부해봐요'; }
  else if (pct >= 40) { emoji = '🥉'; title = '조금 더 노력해봐요'; }
  else { emoji = '📚'; title = '지리는 흐른다~ 다시 도전!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = total + '문제 중 ' + quizScore + '개 정답';
  document.getElementById('result-pct').textContent = pct + '%';
  const wrongDiv = document.getElementById('result-wrong');
  if (quizWrong.length > 0) {
    wrongDiv.innerHTML = '<div style="font-size:0.8rem;color:#c8942a;letter-spacing:0.2em;margin-bottom:0.5rem;">❌ 틀린 문제</div>'
      + quizWrong.map(w =>
        '<div style="background:rgba(204,34,0,0.08);border:1px solid rgba(204,34,0,0.2);border-radius:4px;padding:0.5rem 0.7rem;margin-bottom:0.4rem;font-family:Nanum Myeongjo,serif;font-size:0.85rem;">'
        + '<span style="color:#c8942a;font-weight:bold">' + w.q.name + '</span>'
        + '<span style="color:rgba(245,240,232,0.5)"> → ' + w.q.region + '</span>'
        + '<span style="color:rgba(245,240,232,0.4);font-size:0.75rem;display:block;margin-top:0.2rem">' + w.q.desc + '</span></div>'
      ).join('');
  } else {
    wrongDiv.innerHTML = '<div style="color:#7aff7a;text-align:center;font-family:Black Han Sans,sans-serif;font-size:1.1rem;">🎉 전부 맞혔어요!</div>';
  }
}

// PAIR QUIZ
let pairLeft = [], pairRight = [], pairMatched = 0, pairTotal = 0, pairSelLeft = null, pairSelRight = null;

function startPairQuiz(pool) {
  const items = shuffle(pool).slice(0, 8);
  pairTotal = items.length;
  pairMatched = 0;
  pairSelLeft = null;
  pairSelRight = null;
  pairLeft = shuffle(items).map(p => ({ match: p.name, text: p.name, matched: false }));
  pairRight = shuffle(items).map(p => ({ match: p.name, text: p.region, matched: false }));
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-play').style.display = 'block';
  document.getElementById('q-total').textContent = pairTotal;
  document.getElementById('q-current').textContent = '짝맞추기';
  document.getElementById('q-progress').style.width = '0%';
  document.getElementById('q-score').textContent = '0';
  document.getElementById('q-next-btn').style.display = 'none';
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('q-question').textContent = '지명과 도(道)를 짝지으세요!';
  document.getElementById('q-hint').textContent = pairTotal + '쌍을 모두 맞춰보세요';
  renderPairBoard();
}

function renderPairBoard() {
  const container = document.getElementById('q-options');
  container.style.gridTemplateColumns = '1fr 1fr';
  container.innerHTML = '';
  for (let i = 0; i < pairLeft.length; i++) {
    const lDiv = document.createElement('div');
    lDiv.className = 'pair-card' + (pairLeft[i].matched ? ' matched' : '');
    lDiv.id = 'pair-L-' + i;
    lDiv.textContent = pairLeft[i].text;
    const li = i;
    lDiv.addEventListener('click', () => selectPair(li, 'left'));
    container.appendChild(lDiv);

    const rDiv = document.createElement('div');
    rDiv.className = 'pair-card' + (pairRight[i].matched ? ' matched' : '');
    rDiv.id = 'pair-R-' + i;
    rDiv.textContent = pairRight[i].text;
    const ri = i;
    rDiv.addEventListener('click', () => selectPair(ri, 'right'));
    container.appendChild(rDiv);
  }
}

function selectPair(idx, side) {
  const arr = side === 'left' ? pairLeft : pairRight;
  if (arr[idx].matched) return;
  const elId = 'pair-' + (side === 'left' ? 'L' : 'R') + '-' + idx;
  const el = document.getElementById(elId);
  if (side === 'left') {
    if (pairSelLeft !== null) { const p = document.getElementById('pair-L-' + pairSelLeft); if (p) p.classList.remove('selected'); }
    pairSelLeft = idx; el.classList.add('selected');
  } else {
    if (pairSelRight !== null) { const p = document.getElementById('pair-R-' + pairSelRight); if (p) p.classList.remove('selected'); }
    pairSelRight = idx; el.classList.add('selected');
  }
  if (pairSelLeft !== null && pairSelRight !== null) {
    const lItem = pairLeft[pairSelLeft], rItem = pairRight[pairSelRight];
    const lEl = document.getElementById('pair-L-' + pairSelLeft), rEl = document.getElementById('pair-R-' + pairSelRight);
    if (lItem.match === rItem.match) {
      lItem.matched = true; rItem.matched = true;
      lEl.classList.remove('selected'); lEl.classList.add('matched');
      rEl.classList.remove('selected'); rEl.classList.add('matched');
      pairMatched++;
      document.getElementById('q-score').textContent = pairMatched;
      document.getElementById('q-progress').style.width = (pairMatched / pairTotal * 100) + '%';
      if (pairMatched === pairTotal) {
        setTimeout(() => {
          const fb = document.getElementById('q-feedback');
          fb.style.display = 'block';
          fb.style.background = 'rgba(42,138,42,0.15)';
          fb.style.border = '1px solid rgba(42,138,42,0.4)';
          fb.style.color = '#7aff7a';
          fb.innerHTML = '🎉 모든 짝을 맞췄어요! 지리왕!';
          const nb = document.getElementById('q-next-btn');
          nb.style.display = 'block';
          nb.textContent = '다시 하기 🔄';
          nb.onclick = () => startPairQuiz(getFilteredPlaces());
        }, 300);
      }
    } else {
      lEl.classList.add('wrong-flash'); rEl.classList.add('wrong-flash');
      setTimeout(() => { lEl.classList.remove('wrong-flash','selected'); rEl.classList.remove('wrong-flash','selected'); }, 600);
    }
    pairSelLeft = null; pairSelRight = null;
  }
}

function openMapGame() {
  document.getElementById('map-modal').classList.add('open');
  document.getElementById('mg-start-screen').style.display = 'block';
  document.getElementById('mg-play-screen').style.display = 'none';
  document.getElementById('mg-result').style.display = 'none';
  const rank = getMgRank(mgCoins);
  document.getElementById('mg-coins').textContent = '🪙 ' + mgCoins;
  document.getElementById('mg-rank-badge').textContent = rank.e + ' ' + rank.n;
  document.getElementById('mg-rank-badge').style.color = rank.c;
}

function closeMapGame() {
  document.getElementById('map-modal').classList.remove('open');
}

function startMapGame(scope) {
  const count = parseInt(document.getElementById('mg-count-sel').value);
  let pool = [];
  regions.forEach(r => {
    r.places.forEach(p => {
      const north = isNorthPlace(r.id, p.name);
      if (scope === 'all' || (scope === 'north' && north) || (scope === 'south' && !north)) {
        const key = (p.name==='순천'||p.name==='광주'||p.name==='고성'||p.name==='이천') ? r.id+'::'+p.name : p.name;
        if (mgCoords[key] || mgCoords[p.name]) {
          pool.push({ ...p, region: r.name, regionId: r.id });
        }
      }
    });
  });
  if (pool.length < 4) { alert('좌표 데이터 부족'); return; }
  mgQuestions = shuffle([...pool]).slice(0, Math.min(count, pool.length));
  mgCurrent = 0; mgScore = 0; mgStreak = 0; mgTotalCoins = 0;
  document.getElementById('mg-start-screen').style.display = 'none';
  document.getElementById('mg-result').style.display = 'none';
  document.getElementById('mg-play-screen').style.display = 'block';
  showMgQuestion();
}

function showMgQuestion() {
  mgWaiting = false;
  document.getElementById('mg-hint-btn').style.display = 'inline-block';
  const q = mgQuestions[mgCurrent];
  const total = mgQuestions.length;
  document.getElementById('mg-q-name').textContent = q.name;
  document.getElementById('mg-q-hint').textContent = q.desc + ' · ' + q.region;
  document.getElementById('mg-q-label').textContent = (mgCurrent+1) + ' / ' + total + ' 문제';
  document.getElementById('mg-feedback').textContent = '';
  document.getElementById('mg-feedback').style.color = '#f5f0e8';
  document.getElementById('mg-progress-fill').style.width = (mgCurrent / total * 100) + '%';
  document.getElementById('mg-score').textContent = mgScore + ' / ' + mgCurrent;
  document.getElementById('mg-streak').textContent = mgStreak >= 3 ? '🔥 ' + mgStreak + '연속!' : '';
  // clear dots
  document.getElementById('map-dot-layer').innerHTML = '';
}

function mgHandleClick(e) {
  if (mgWaiting) return;
  const wrap = document.getElementById('map-canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const rawX = (e.clientX - rect.left) / rect.width;
  const rawY = (e.clientY - rect.top) / rect.height;
  const px = rawX;
  const py = rawY;
  const q = mgQuestions[mgCurrent];
  const coordKey = mgCoords[q.regionId + '::' + q.name] ? q.regionId + '::' + q.name : q.name;
  const coord = mgCoords[coordKey];
  if (!coord) return;
  const [tx, ty] = coord;
  const txImg = tx;
  const tyImg = ty;
  const dist = Math.sqrt((px - tx) ** 2 + (py - ty) ** 2);

  // 거리 기반 정답 판정 및 코인 계산
  // 이미지 내 좌표 기준: 0.03 이하 = 완벽, 0.08 이하 = 정답
  const MAX_DIST = 0.09;
  const correct = dist < MAX_DIST;
  let earned = 0;
  if (correct) {
    if (dist < 0.025) earned = 30 + mgStreak * 5;
    else if (dist < 0.05) earned = 20 + mgStreak * 3;
    else earned = 10 + mgStreak * 2;
    if (dist < 0.02) playPerfect(); else playCorrect();
    mgScore++;
    mgStreak++;
    mgCoins += earned;
    mgTotalCoins += earned;
    showCoinFloat(e.clientX, e.clientY, earned);
  } else {
    playWrong();
    const mq = mgQuestions[mgCurrent];
    addToWrongNote('map', { name: mq.name, region: mq.region, regionId: mq.regionId, desc: mq.desc, info: mq.info, tags: mq.tags });
    mgStreak = 0;
  }

  // 클릭 dot
  placeDot(rawX, rawY, correct ? 'correct' : 'wrong');
  // 정답 위치 dot
  if (!correct) {
    placeDot(txImg, tyImg, 'target');
  }

  const fb = document.getElementById('mg-feedback');
  if (correct) {
    fb.style.color = '#7aff7a';
    fb.textContent = `✅ 정확! +${earned}🪙 ${mgStreak >= 3 ? '🔥연속보너스!' : ''}`;
  } else {
    fb.style.color = '#ff9a9a';
    const distKm = Math.round(dist * 1200);
    fb.textContent = `❌ 틀렸어요! 실제 위치(🟠)를 확인하세요. (약 ${distKm}km 오차)`;
  }
  document.getElementById('mg-coins').textContent = '🪙 ' + mgCoins;
  document.getElementById('mg-score').textContent = mgScore + ' / ' + (mgCurrent+1);
  document.getElementById('mg-streak').textContent = mgStreak >= 3 ? '🔥 ' + mgStreak + '연속!' : '';

  mgWaiting = true;
  setTimeout(() => {
    mgCurrent++;
    if (mgCurrent >= mgQuestions.length) {
      showMgResult();
    } else {
      showMgQuestion();
    }
  }, correct ? 1000 : 1800);
}

function placeDot(rx, ry, cls) {
  const layer = document.getElementById('map-dot-layer');
  const d = document.createElement('div');
  d.className = 'map-dot ' + cls;
  d.style.left = (rx * 100) + '%';
  d.style.top = (ry * 100) + '%';
  layer.appendChild(d);
}

function showCoinFloat(cx, cy, n) {
  const el = document.createElement('div');
  el.className = 'coin-float';
  el.textContent = '+' + n + '🪙';
  el.style.left = (cx - 20) + 'px';
  el.style.top = (cy - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function mgShowHint() {
  const q = mgQuestions[mgCurrent];
  const hKey = mgCoords[q.regionId + '::' + q.name] ? q.regionId + '::' + q.name : q.name;
  const hcoord = mgCoords[hKey];
  if (!hcoord) return;
  const [htx, hty] = hcoord;
  const tx = htx;
  const ty = hty;
  // Flash a circle around the correct area
  const layer = document.getElementById('map-dot-layer');
  const hint = document.createElement('div');
  const hx = (tx*100).toFixed(2) + '%';
  const hy = (ty*100).toFixed(2) + '%';
  hint.style.position = 'absolute';
  hint.style.left = hx;
  hint.style.top = hy;
  hint.style.width = '80px';
  hint.style.height = '80px';
  hint.style.borderRadius = '50%';
  hint.style.border = '3px dashed rgba(200,148,42,0.7)';
  hint.style.transform = 'translate(-50%,-50%)';
  hint.style.animation = 'hintPulse 1.5s ease forwards';
  hint.style.pointerEvents = 'none';
  layer.appendChild(hint);
  setTimeout(() => hint.remove(), 1500);
  // Deduct coins
  mgCoins = Math.max(0, mgCoins - 5);
  document.getElementById('mg-coins').textContent = '🪙 ' + mgCoins;
  document.getElementById('mg-hint-btn').style.display = 'none';
  // Show info hint
  document.getElementById('mg-feedback').style.color = '#c8942a';
  document.getElementById('mg-feedback').textContent = '💡 ' + q.info.substring(0, 50) + '...';
}

function showMgResult() {
  document.getElementById('mg-play-screen').style.display = 'none';
  const res = document.getElementById('mg-result');
  res.style.display = 'block';
  const total = mgQuestions.length;
  const pct = Math.round(mgScore / total * 100);
  let emoji, title;
  if (pct >= 90) { emoji = '🏆'; title = '지리 천재!'; }
  else if (pct >= 70) { emoji = '🥇'; title = '대단해요!'; }
  else if (pct >= 50) { emoji = '🥈'; title = '잘했어요!'; }
  else { emoji = '📚'; title = '더 공부해봐요!'; }
  document.getElementById('mg-result-emoji').textContent = emoji;
  document.getElementById('mg-result-title').textContent = title;
  const rrank = getMgRank(mgCoins);
  document.getElementById('mg-result-coins').innerHTML = '획득 코인: <b>' + mgTotalCoins + ' 🪙</b>  (누적: ' + mgCoins + ' 🪙)<br><span style="font-size:1.1rem;color:'+rrank.c+'">'+rrank.e+' '+rrank.n+' (Lv.'+Math.floor(mgCoins/10)+')</span>';
  document.getElementById('mg-result-detail').textContent = `${total}문제 중 ${mgScore}개 정답 (${pct}%)`;
}

let wrongNoteData = JSON.parse(localStorage.getItem('wrongNote') || '[]');

function saveWrongNote() {
  localStorage.setItem('wrongNote', JSON.stringify(wrongNoteData));
  updateWrongNoteCount();
}

function updateWrongNoteCount() {
  const cnt = wrongNoteData.length;
  const el = document.getElementById('wrong-note-count');
  if (cnt > 0) {
    el.textContent = cnt;
    el.style.display = 'inline';
  } else {
    el.style.display = 'none';
  }
  const quizBtn = document.getElementById('wn-quiz-btn');
  if (quizBtn) quizBtn.style.display = cnt > 0 ? 'inline-block' : 'none';
}

function addToWrongNote(source, item) {
  // source: 'quiz' or 'map'
  // 중복 방지: 같은 지명은 횟수만 증가
  const key = item.name;
  const existing = wrongNoteData.find(w => w.name === key);
  if (existing) {
    existing.count = (existing.count || 1) + 1;
    existing.lastWrong = new Date().toLocaleDateString('ko-KR');
    existing.source = source;
    if (item.chosen) existing.lastChosen = item.chosen;
  } else {
    wrongNoteData.push({
      name: key,
      region: item.region || '',
      regionId: item.regionId || '',
      desc: item.desc || '',
      info: item.info || '',
      tags: item.tags || [],
      source: source,
      count: 1,
      lastWrong: new Date().toLocaleDateString('ko-KR'),
      lastChosen: item.chosen || '',
    });
  }
  saveWrongNote();
}

function openWrongNote() {
  document.getElementById('wrong-note-modal').style.display = 'block';
  renderWrongNote('all');
  updateWrongNoteCount();
}

function closeWrongNote() {
  document.getElementById('wrong-note-modal').style.display = 'none';
}

function clearWrongNote() {
  if (!confirm('오답노트를 전체 삭제할까요?')) return;
  wrongNoteData = [];
  saveWrongNote();
  renderWrongNote('all');
}

let currentWNFilter = 'all';

function filterWrongNote(tab) {
  currentWNFilter = tab;
  document.querySelectorAll('.wn-tab').forEach(b => {
    const active = b.dataset.tab === tab;
    b.style.background = active ? '#c8942a' : 'none';
    b.style.color = active ? '#1a0a00' : '#aaa';
    b.style.borderColor = active ? '#c8942a' : '#666';
  });
  renderWrongNote(tab);
}

function renderWrongNote(filter) {
  const list = document.getElementById('wrong-note-list');
  const data = filter === 'all' ? wrongNoteData :
               wrongNoteData.filter(w => w.source === filter);

  if (data.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#666;padding:3rem;font-size:1rem;">오답이 없습니다 🎉</div>';
    return;
  }

  // 오답 횟수 많은 순 정렬
  const sorted = [...data].sort((a,b) => (b.count||1)-(a.count||1));

  list.innerHTML = sorted.map((w,i) => `
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(200,148,42,0.2);border-radius:8px;padding:0.8rem 1rem;margin-bottom:0.5rem;display:flex;gap:1rem;align-items:flex-start;">
      <div style="min-width:2rem;text-align:center;">
        <div style="font-size:1.4rem;font-family:'Black Han Sans',sans-serif;color:${w.count>=3?'#cc2200':'#c8942a'}">${w.count||1}</div>
        <div style="font-size:0.6rem;color:#666">틀림</div>
      </div>
      <div style="flex:1;">
        <div style="display:flex;gap:0.5rem;align-items:baseline;flex-wrap:wrap;">
          <span style="font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:#f5f0e8">${w.name}</span>
          <span style="font-size:0.75rem;color:#c8942a">${w.region}</span>
          <span style="font-size:0.7rem;color:#555">${w.source==='quiz'?'📝 퀴즈':'🗺️ 지도게임'}</span>
          <span style="font-size:0.7rem;color:#555">${w.lastWrong||''}</span>
        </div>
        <div style="font-size:0.8rem;color:#a0968a;margin-top:0.2rem">${w.desc||''}</div>
        <div style="font-size:0.78rem;color:rgba(245,240,232,0.5);margin-top:0.2rem;line-height:1.4">${w.info||''}</div>
        ${w.lastChosen ? '<div style="font-size:0.75rem;color:#cc2200;margin-top:0.2rem">내 답: ' + w.lastChosen + '</div>' : ''}
        ${w.tags&&w.tags.length ? '<div style="margin-top:0.3rem">' + w.tags.map(t=>'<span style="background:rgba(200,148,42,0.15);border-radius:3px;padding:1px 5px;font-size:0.7rem;color:#c8942a;margin-right:3px">#'+t+'</span>').join('') + '</div>' : ''}
      </div>
      <button onclick="removeFromWrongNote(${i})" style="background:none;border:none;color:#666;cursor:pointer;font-size:1rem;padding:0">✕</button>
    </div>
  `).join('');
}

function removeFromWrongNote(idx) {
  // idx는 정렬된 배열 기준 - 이름으로 재검색
  const sorted = [...wrongNoteData].sort((a,b)=>(b.count||1)-(a.count||1));
  const name = sorted[idx] ? sorted[idx].name : null;
  if (!name) return;
  wrongNoteData = wrongNoteData.filter(w => w.name !== name);
  saveWrongNote();
  renderWrongNote(currentWNFilter);
}

function startWrongNoteQuiz() {
  if (wrongNoteData.length < 2) { alert('오답이 2개 이상 필요합니다'); return; }
  closeWrongNote();
  // 오답노트 항목으로 퀴즈 풀기
  const pool = wrongNoteData.map(w => ({
    name: w.name, region: w.region, regionId: w.regionId,
    desc: w.desc, info: w.info, tags: w.tags
  }));
  quizQuestions = shuffle([...pool]).slice(0, Math.min(pool.length, 20));
  quizCurrent = 0; quizScore = 0; quizWrong = [];
  quizType = 'region';
  document.getElementById('quiz-modal').style.display = 'block';
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-play').style.display = 'block';
  document.getElementById('q-total').textContent = quizQuestions.length;
  showQuestion();
}

// 초기 카운트 표시
document.addEventListener('DOMContentLoaded', updateWrongNoteCount);

</script>

<!-- 오답노트 모달 -->
<div id="wrong-note-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;overflow-y:auto;">
  <div style="max-width:800px;margin:2rem auto;padding:1rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-family:'Black Han Sans',sans-serif;color:#c8942a;font-size:1.5rem;">📒 오답노트</h2>
      <div style="display:flex;gap:0.5rem;">
        <button onclick="startWrongNoteQuiz()" id="wn-quiz-btn" style="padding:0.4rem 1rem;background:#1a3a6e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;display:none">🔁 오답만 다시 풀기</button>
        <button onclick="clearWrongNote()" style="padding:0.4rem 0.8rem;background:rgba(204,34,0,0.3);color:#f88;border:1px solid #c22;border-radius:6px;cursor:pointer;font-size:0.85rem;">🗑️ 전체 삭제</button>
        <button onclick="closeWrongNote()" style="padding:0.4rem 0.8rem;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;">✕ 닫기</button>
      </div>
    </div>
    <div id="wrong-note-tabs" style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
      <button class="wn-tab active" onclick="filterWrongNote('all')" data-tab="all" style="padding:0.3rem 0.8rem;border-radius:20px;border:1px solid #c8942a;background:#c8942a;color:#1a0a00;cursor:pointer;font-size:0.8rem;">전체</button>
      <button class="wn-tab" onclick="filterWrongNote('quiz')" data-tab="quiz" style="padding:0.3rem 0.8rem;border-radius:20px;border:1px solid #666;background:none;color:#aaa;cursor:pointer;font-size:0.8rem;">📝 퀴즈</button>
      <button class="wn-tab" onclick="filterWrongNote('map')" data-tab="map" style="padding:0.3rem 0.8rem;border-radius:20px;border:1px solid #666;background:none;color:#aaa;cursor:pointer;font-size:0.8rem;">🗺️ 지도게임</button>
    </div>
    <div id="wrong-note-list"></div>
  </div>
</div>
